<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#101418" />
  <meta name="description" content="Simple AI chat assistant." />

  <title>The AI</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>

  <main class="main-pane">
    <header class="topbar">
      <div class="conversation-heading">
        <div id="activeTitle" class="active-title">The AI</div>
        <div id="activeMeta" class="active-meta">Ready</div>
      </div>

      <div id="statusDot" class="status-dot"></div>
    </header>

    <section id="messages" class="messages"></section>

    <form id="composer" class="composer">
      <textarea id="promptInput" rows="1" placeholder="Message The AI"></textarea>

      <button id="sendButton" class="send-button" type="submit">
        <svg viewBox="0 0 24 24">
          <path d="M22 2 11 13"></path>
          <path d="m22 2-7 20-4-9-9-4 20-7Z"></path>
        </svg>
      </button>
    </form>
  </main>

  <script src="./app.js" defer></script>
</body>
</html>
