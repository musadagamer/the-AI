<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#101418" />
  <meta name="description" content="Simple AI chat assistant." />
  <title>Simple AI</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icons/icon.svg" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <dialog id="passwordDialog" class="settings-dialog">
    <form id="passwordForm" class="settings-panel">
      <div class="dialog-head">
        <div>
          <h2>Simple AI</h2>
          <p>Enter the access password to continue</p>
        </div>
      </div>
      <label class="field">
        <span>Password</span>
        <input id="passwordInput" type="password" autocomplete="off" required />
      </label>
      <div class="dialog-actions">
        <button class="primary-button compact" type="submit">Unlock</button>
      </div>
      <div id="passwordMessage" class="settings-message"></div>
    </form>
  </dialog>

  <div id="app" class="app-shell">
    <aside id="sidebar" class="sidebar">
      <div class="brand-row">
        <div class="brand-mark">AI</div>
        <div>
          <div class="brand-title">Simple AI</div>
          <div id="providerLabel" class="brand-subtitle">Simple AI</div>
        </div>
      </div>

      <button id="newChatButton" class="primary-button" type="button">
        <span aria-hidden="true">+</span>
        New Chat
      </button>

      <label class="search-box">
        <span class="search-icon" aria-hidden="true">⌕</span>
        <input id="chatSearch" type="search" placeholder="Search chats" autocomplete="off" />
      </label>

      <nav id="chatList" class="chat-list" aria-label="Chats"></nav>

      <div class="sidebar-footer">
        <button id="installButton" class="ghost-button" type="button">Install</button>
        <button id="settingsButton" class="ghost-button" type="button">Settings</button>
      </div>
    </aside>

    <main class="main-pane">
      <header class="topbar">
        <button id="sidebarButton" class="icon-button" type="button" aria-label="Toggle sidebar">
          <span></span><span></span><span></span>
        </button>
        <div class="conversation-heading">
          <div id="activeTitle" class="active-title">Simple AI</div>
          <div id="activeMeta" class="active-meta">Ready</div>
        </div>
        <div id="statusDot" class="status-dot" title="Connection status"></div>
      </header>

      <section id="messages" class="messages" aria-live="polite"></section>

      <form id="composer" class="composer">
        <textarea id="promptInput" rows="1" placeholder="Message Simple AI"></textarea>
        <button id="sendButton" class="send-button" type="submit" aria-label="Send message">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M22 2 11 13"></path>
            <path d="m22 2-7 20-4-9-9-4 20-7Z"></path>
          </svg>
        </button>
      </form>
    </main>
  </div>

  <div id="installToast" class="toast" hidden>
    c

  <dialog id="settingsDialog" class="settings-dialog">
    <form method="dialog" class="settings-panel">
      <div class="dialog-head">
        <div>
          <h2>Settings</h2>
          <p>Customize how Simple AI responds</p>
        </div>
        <button id="closeSettingsButton" class="icon-x" type="button" aria-label="Close">x</button>
      </div>

      <label class="field">
        <span>System prompt</span>
        <textarea id="systemPromptInput" rows="4"></textarea>
      </label>

      <div class="dialog-actions">
        <button id="testConnectionButton" class="ghost-button" type="button">Test connection</button>
        <button class="primary-button compact" value="default" type="submit">Save</button>
      </div>
      <div id="settingsMessage" class="settings-message"></div>
    </form>
  </dialog>

  <script src="./app.js" defer></script>
</body>
</html>
